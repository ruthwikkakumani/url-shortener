services:
  auth-service:
    image: ruthwikkakumani/auth-service:latest
    env_file:
      - .env
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - ENV=${ENV}
      - PORT=${AUTH_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - DB_CONN=${DB_CONN_AUTH}
    restart: unless-stopped

  url-service:
    image: ruthwikkakumani/url-service:latest
    env_file:
      - .env
    container_name: url-service
    ports:
      - "8082:8082"
    environment:
      - ENV=${ENV}
      - PORT=${URL_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=${BASE_URL}
      - DB_CONN=${DB_CONN_URL}
    restart: unless-stopped