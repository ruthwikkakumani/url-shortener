services:
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - ENV=${ENV:-development}
      - PORT=${PORT:-8081}
      - JWT_SECRET=${JWT_SECRET}
      - DB_CONN_STRING_AUTH_SERVICE=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres-auth:5432/auth_service_db?sslmode=disable
    depends_on:
      postgres-auth:
        condition: service_healthy
    restart: unless-stopped

  url-service:
    build:
      context: .
      dockerfile: services/url-service/Dockerfile
    container_name: url-service
    ports:
      - "8082:8082"
    environment:
      - ENV=${ENV:-development}
      - PORT=${PORT:-8082}
      - JWT_SECRET=${JWT_SECRET}
      - DB_CONN=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres-url:5432/url_service_db?sslmode=disable
      - BASE_URL=${BASE_URL:-http://localhost:8082}
    depends_on:
      postgres-url:
        condition: service_healthy
    restart: unless-stopped

  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=auth_service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./services/auth-service/init.sql:/docker-entrypoint-initdb.d/01-init-auth.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-url:
    image: postgres:15-alpine
    container_name: postgres-url
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=url_service_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_url_data:/var/lib/postgresql/data
      - ./services/url-service/init.sql:/docker-entrypoint-initdb.d/02-init-url.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_service_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_auth_data:
  postgres_url_data:
